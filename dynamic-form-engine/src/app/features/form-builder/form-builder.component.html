<h1>Dynamic Form Builder</h1>

<p class="subtitle">This form is generated dynamically from a JSON configuration file.</p>

<app-dynamic-form [fields]="formConfig" (submitForm)="onSubmit($event)"></app-dynamic-form>

<div class="result" *ngIf="submittedData">
  <h3>Submitted Data</h3>

  <pre>{{ submittedData | json }}</pre>
</div>
