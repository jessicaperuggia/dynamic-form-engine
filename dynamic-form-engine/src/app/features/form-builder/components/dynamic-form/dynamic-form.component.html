<div class="container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div *ngFor="let field of fields">
      <div *ngIf="isVisible(field)">
        <label [for]="field.name">
          {{ field.label }}
        </label>

        <!-- TEXT -->
        <input
          *ngIf="field.type === 'text'"
          [id]="field.name"
          type="text"
          [formControlName]="field.name"
        />

        <!-- TEXTAREA -->
        <textarea
          *ngIf="field.type === 'textarea'"
          [id]="field.name"
          [formControlName]="field.name"
        ></textarea>

        <!-- SELECT -->
        <select *ngIf="field.type === 'select'" [id]="field.name" [formControlName]="field.name">
          <option *ngFor="let opt of field.options" [value]="opt.value">
            {{ opt.label }}
          </option>
        </select>

        <div
          class="error"
          *ngIf="
            getControl(field.name)?.invalid &&
            (getControl(field.name)?.touched || getControl(field.name)?.dirty)
          "
        >
          <span *ngIf="getControl(field.name)?.errors?.['required']">
            {{ field.errorMessage || field.label + ' is required' }}
          </span>

          <span *ngIf="getControl(field.name)?.errors?.['minlength']">
            Minimum {{ field.validators?.minLength }} characters.
          </span>

          <span *ngIf="getControl(field.name)?.errors?.['pattern']"> Invalid value. </span>
        </div>
      </div>
    </div>

    <button type="submit" [disabled]="form.invalid">Submit</button>
  </form>
</div>
